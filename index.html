<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kediyi Bul 😺</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#87CEEB,#FFD1DC);
    font-family:Arial,sans-serif;
    text-align:center;
    padding:15px;
}

h1{
    color:white;
    text-shadow:2px 2px 4px rgba(0,0,0,.4);
    margin-bottom:10px;
}

#score{
    color:white;
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

#message{
    color:white;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.grid{
    width:min(95vw,900px);
    margin:auto;
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:4px;
}

.box{
    aspect-ratio:1;
    border:none;
    border-radius:8px;
    background:white;
    cursor:pointer;
    font-size:18px;
    transition:.15s;
}

.box:hover{
    transform:scale(1.05);
}

#reward{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#reward h1{
    color:white;
    margin-bottom:20px;
}

#reward img{
    max-width:90%;
    max-height:80vh;
    border-radius:15px;
}
</style>
</head>
<body>

<h1>😺 Kediyi Bul 😺</h1>

<div id="score">Bulunan Kedi: 0 / 5</div>
<div id="message">100 kutudan birinde kedi gizli!</div>

<div class="grid" id="grid"></div>

<div id="reward">
    <h1>🎉 Tebrikler 🎉</h1>
    <img src="odul.png" alt="Ödül">
</div>

<script>
const TOTAL_BOXES = 100;

const grid = document.getElementById("grid");
const scoreText = document.getElementById("score");
const message = document.getElementById("message");

let catIndex = 0;
let score = 0;

function createRound(){

    grid.innerHTML = "";

    catIndex = Math.floor(Math.random() * TOTAL_BOXES);

    for(let i=0;i<TOTAL_BOXES;i++){

        const btn = document.createElement("button");

        btn.className = "box";
        btn.textContent = "📦";

        btn.onclick = () => {

            if(btn.disabled) return;
            btn.disabled = true;

            if(i === catIndex){

                btn.textContent = "😺";

                score++;

                scoreText.textContent =
                `Bulunan Kedi: ${score} / 5`;

                message.textContent =
                "🎉 Kediyi buldun!";

                if(score >= 5){

                    document.getElementById("reward")
                    .style.display = "flex";

                    return;
                }

                setTimeout(()=>{
                    createRound();
                },1000);

                return;
            }

            const distance =
            Math.abs(i - catIndex);

            if(distance <= 2){

                btn.textContent = "🔥";
                message.textContent =
                "ÇOK SICAK!";

            }else if(distance <= 6){

                btn.textContent = "🌡️";
                message.textContent =
                "Sıcak!";

            }else if(distance <= 12){

                btn.textContent = "🙂";
                message.textContent =
                "Yaklaşıyorsun.";

            }else if(distance <= 25){

                btn.textContent = "🥶";
                message.textContent =
                "Soğuk.";

            }else{

                btn.textContent = "❄️";
                message.textContent =
                "Çok uzaksın.";
            }
        };

        grid.appendChild(btn);
    }
}

createRound();
</script>

</body>
</html>
