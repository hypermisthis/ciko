<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bir Sorum Var</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    width:500px;
    max-width:95%;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

#cat{
    width:260px;
    height:260px;
    object-fit:cover;
    border-radius:20px;
}

h1{
    margin:20px 0;
    color:#222;
}

p{
    color:#666;
    margin-bottom:20px;
}

button{
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:8px;
    transition:.25s;
}

#evet{
    background:#4CAF50;
    color:white;
}

#hayir{
    background:#ececec;
}

#message{
    margin-top:15px;
    color:#555;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">

<img id="cat"
src="https://cataas.com/cat/cute?width=500&height=500">

<h1 id="title">Bir sorum var 😼</h1>

<p>Dürüst cevap ver.</p>

<button id="evet">Evet</button>
<button id="hayir">Hayır</button>

<div id="message"></div>

</div>

<script>

setTimeout(()=>{
    document.getElementById("title").innerText =
    "Beni seviyor musun?";
},1500);

const hayir = document.getElementById("hayir");
const evet = document.getElementById("evet");
const message = document.getElementById("message");

const sozler = [
    "Emin misin? 😾",
    "Bir daha düşün 🤨",
    "Kedi üzüldü 😿",
    "Yanlış seçenek 😼",
    "Yakalayamazsın 😎"
];

let sayac = 0;
let boyut = 18;

hayir.style.position = "fixed";
hayir.style.transition = "all .35s ease";

hayir.addEventListener("mouseenter",()=>{

    message.innerText =
    sozler[Math.min(sayac, sozler.length-1)];

    hayir.style.left =
    Math.random()*(window.innerWidth-140)+"px";

    hayir.style.top =
    Math.random()*(window.innerHeight-70)+"px";

    boyut += 3;
    evet.style.fontSize = boyut + "px";

    sayac++;
});

evet.onclick = ()=>{

document.querySelector(".card").innerHTML = `

<img
style="width:260px;height:260px;object-fit:cover;border-radius:20px"
src="https://cataas.com/cat/cute?width=600&height=600">

<h1 style="margin-top:20px">
Tahmin etmiştim 😼
</h1>

<p style="margin-top:10px">
Bugünün en güzel haberi buydu.
</p>

<p style="margin-top:15px">
Ödül olarak ekstra bir kedi 🐱
</p>

`;

};

</script>

</body>
</html>
