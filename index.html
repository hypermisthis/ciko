<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kediyi Bul!</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#87CEEB,#FFD1DC);
    text-align:center;
}

h1{
    color:white;
    text-shadow:2px 2px 5px black;
}

#score{
    font-size:28px;
    color:white;
    margin-bottom:20px;
}

.grid{
    width:min(90vw,600px);
    margin:auto;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.box{
    aspect-ratio:1;
    border:none;
    border-radius:15px;
    font-size:40px;
    cursor:pointer;
    background:white;
    transition:.2s;
}

.box:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    font-size:24px;
    color:white;
    font-weight:bold;
}

#reward{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#reward h1{
    color:white;
}

#reward img{
    max-width:90%;
    max-height:80vh;
    border-radius:15px;
}
</style>
</head>
<body>

<h1>😺 Kediyi Bul 😺</h1>

<div id="score">Skor: 0 / 5</div>

<div class="grid" id="grid"></div>

<div id="message">Kediyi bul!</div>

<div id="reward">
    <h1>🎉 Tebrikler 🎉</h1>
    <img src="odul.png">
</div>

<script>
const grid = document.getElementById("grid");
const scoreText = document.getElementById("score");
const message = document.getElementById("message");

let score = 0;
let catIndex = 0;

function newRound(){

    grid.innerHTML = "";

    catIndex = Math.floor(Math.random()*25);

    for(let i=0;i<25;i++){

        const btn = document.createElement("button");
        btn.className = "box";
        btn.textContent = "📦";

        btn.onclick = () => {

            if(i === catIndex){

                btn.textContent = "😺";
                score++;

                scoreText.textContent =
                `Skor: ${score} / 5`;

                message.textContent =
                "Doğru! Kediyi buldun 😺";

                if(score >= 5){

                    document.getElementById("reward")
                    .style.display = "flex";

                    return;
                }

                setTimeout(newRound,1000);

            }else{

                btn.textContent = "❌";

                message.textContent =
                "Yanlış kutu 😭";
            }

        };

        grid.appendChild(btn);
    }
}

newRound();
</script>

</body>
</html>
